<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Oracle OS — Theory Space Navigator</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@300;400;500;600&family=Space+Grotesk:wght@300;400;500;600;700&display=swap');

  :root {
    --bg: #030308; --bg-panel: rgba(8, 12, 24, 0.88);
    --border: rgba(60, 180, 220, 0.12); --cyan: #3cb4dc;
    --green: #2ecc71; --red: #e74c3c; --orange: #e67e22;
    --gold: #C9A227; --purple: #9b59b6; --teal: #1a9e8f;
    --text: #c8d6e5; --text-dim: rgba(200, 214, 229, 0.45);
    --font-mono: 'IBM Plex Mono', monospace;
    --font-display: 'Space Grotesk', sans-serif;
  }

  body { background: var(--bg); color: var(--text); font-family: var(--font-mono); overflow: hidden; height: 100vh; width: 100vw; }

  .header {
    position: fixed; top: 0; left: 0; right: 0; height: 44px;
    display: flex; align-items: center; justify-content: space-between;
    padding: 0 20px; border-bottom: 1px solid var(--border);
    background: var(--bg-panel); backdrop-filter: blur(16px); z-index: 200;
  }
  .header-left { display: flex; align-items: center; gap: 14px; }
  .logo { font-family: var(--font-display); font-weight: 600; font-size: 13px; letter-spacing: 2.5px; text-transform: uppercase; color: var(--cyan); }
  .plate-label { font-size: 10px; color: var(--text-dim); letter-spacing: 1.5px; text-transform: uppercase; }

  .view-switcher {
    display: flex; gap: 2px; background: rgba(255,255,255,0.03);
    border-radius: 4px; padding: 2px;
  }
  .view-btn {
    font-family: var(--font-mono); font-size: 9px; letter-spacing: 1px;
    text-transform: uppercase; padding: 4px 10px; border: none;
    background: transparent; color: var(--text-dim); cursor: pointer;
    border-radius: 3px; transition: all 0.2s;
  }
  .view-btn.active { background: rgba(60, 180, 220, 0.15); color: var(--cyan); }

  #main-canvas { position: fixed; top: 44px; left: 0; width: 100%; height: calc(100vh - 44px); }

  .metrics-panel {
    position: fixed; top: 68px; right: 20px; width: 200px;
    background: var(--bg-panel); border: 1px solid var(--border);
    border-radius: 8px; padding: 14px; backdrop-filter: blur(12px); z-index: 50;
  }
  .metrics-panel h3 {
    font-family: var(--font-display); font-size: 10px; letter-spacing: 2px;
    text-transform: uppercase; color: var(--cyan); margin-bottom: 10px;
    padding-bottom: 6px; border-bottom: 1px solid var(--border);
  }
  .m-row { display: flex; justify-content: space-between; padding: 4px 0; }
  .m-label { font-size: 9px; color: var(--text-dim); letter-spacing: 1px; text-transform: uppercase; }
  .m-val { font-size: 12px; font-weight: 500; font-variant-numeric: tabular-nums; }

  .equation {
    position: fixed; bottom: 20px; left: 20px;
    background: var(--bg-panel); border: 1px solid var(--border);
    border-radius: 8px; padding: 10px 16px; backdrop-filter: blur(12px);
    z-index: 50; font-size: 10px; color: rgba(60, 180, 220, 0.4); line-height: 1.9;
  }
  .equation em { color: var(--cyan); font-style: normal; font-weight: 500; }
</style>
</head>
<body>

<div class="header">
  <div class="header-left">
    <span class="logo">Oracle OS</span>
    <span class="plate-label">Plate VII — Theory Space Navigator</span>
  </div>
  <div class="view-switcher">
    <button class="view-btn active" onclick="setView('topo')">Topological</button>
    <button class="view-btn" onclick="setView('heat')">Heat Map</button>
    <button class="view-btn" onclick="setView('geodesic')">Geodesic</button>
    <button class="view-btn" onclick="setView('cluster')">Clusters</button>
  </div>
</div>

<canvas id="main-canvas"></canvas>

<div class="metrics-panel">
  <h3>Geometry</h3>
  <div class="m-row"><span class="m-label">Curvature K</span><span class="m-val" style="color: var(--orange);" id="g-curve">0.38</span></div>
  <div class="m-row"><span class="m-label">Distance d</span><span class="m-val" style="color: var(--cyan);" id="g-dist">1.27</span></div>
  <div class="m-row"><span class="m-label">Coherence</span><span class="m-val" style="color: var(--green);" id="g-cohere">0.81</span></div>
  <div class="m-row"><span class="m-label">Novelty</span><span class="m-val" style="color: var(--purple);" id="g-novel">0.64</span></div>
  <div class="m-row"><span class="m-label">Evidence Fit</span><span class="m-val" style="color: var(--green);" id="g-evidence">0.91</span></div>
  <div class="m-row"><span class="m-label">Theories</span><span class="m-val" style="color: var(--cyan);" id="g-theories">47</span></div>
</div>

<div class="equation">
  <em>ds<sup>2</sup></em> = g<sub>ij</sub> d&theta;<sup>i</sup> d&theta;<sup>j</sup><br>
  <em>K</em> = R<sub>ijkl</sub> / (g<sub>ik</sub>g<sub>jl</sub> &minus; g<sub>il</sub>g<sub>jk</sub>)<br>
  <em>d(T<sub>1</sub>, T<sub>2</sub>)</em> = inf &int; &radic;(g<sub>ij</sub> &middot; d&gamma;) dt
</div>

<script>
const canvas = document.getElementById('main-canvas');
const ctx = canvas.getContext('2d');
let W, H, cx, cy, time = 0;
let currentView = 'topo';

// Theory points on the manifold
const theories = [];
const THEORY_COUNT = 47;

// Regions
const truthBasin = { x: 0.35, y: 0.6, r: 0.15 };
const highCurve = { x: 0.75, y: 0.25, r: 0.12 };
const frontier = { x: 0.8, y: 0.7, r: 0.1 };

function initTheories() {
  for (let i = 0; i < THEORY_COUNT; i++) {
    let x, y, cluster;
    const r = Math.random();
    if (r < 0.45) {
      // Near truth basin
      x = truthBasin.x + (Math.random() - 0.5) * 0.25;
      y = truthBasin.y + (Math.random() - 0.5) * 0.2;
      cluster = 0;
    } else if (r < 0.7) {
      // Mid-space
      x = 0.3 + Math.random() * 0.4;
      y = 0.2 + Math.random() * 0.5;
      cluster = 1;
    } else if (r < 0.85) {
      // High curvature
      x = highCurve.x + (Math.random() - 0.5) * 0.15;
      y = highCurve.y + (Math.random() - 0.5) * 0.15;
      cluster = 2;
    } else {
      // Frontier
      x = frontier.x + (Math.random() - 0.5) * 0.15;
      y = frontier.y + (Math.random() - 0.5) * 0.15;
      cluster = 3;
    }

    theories.push({
      x, y, cluster,
      size: 2 + Math.random() * 3,
      coherence: cluster === 0 ? 0.7 + Math.random() * 0.3 : 0.3 + Math.random() * 0.5,
      novelty: cluster === 3 ? 0.6 + Math.random() * 0.4 : Math.random() * 0.5,
      drift: { dx: (Math.random() - 0.5) * 0.0003, dy: (Math.random() - 0.5) * 0.0003 },
      pulseOffset: Math.random() * Math.PI * 2
    });
  }
}

function setView(v) {
  currentView = v;
  document.querySelectorAll('.view-btn').forEach(b => {
    b.classList.toggle('active', b.textContent.toLowerCase().includes(v));
  });
}

function resize() {
  const dpr = window.devicePixelRatio || 1;
  W = window.innerWidth; H = window.innerHeight - 44;
  canvas.width = W * dpr; canvas.height = H * dpr;
  canvas.style.width = W + 'px'; canvas.style.height = H + 'px';
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  cx = W / 2; cy = H / 2;
}

// Manifold curvature field
function curvature(px, py) {
  const hd = Math.sqrt((px - highCurve.x) ** 2 + (py - highCurve.y) ** 2);
  const highK = Math.exp(-hd * hd * 30) * 0.8;

  const td = Math.sqrt((px - truthBasin.x) ** 2 + (py - truthBasin.y) ** 2);
  const lowK = Math.exp(-td * td * 15) * -0.3;

  return 0.15 + highK + lowK + Math.sin(px * 8 + py * 5 + time * 0.005) * 0.03;
}

function drawManifoldField() {
  const res = currentView === 'heat' ? 4 : 8;
  for (let px = 0; px < W; px += res) {
    for (let py = 0; py < H; py += res) {
      const nx = px / W, ny = py / H;
      const k = curvature(nx, ny);

      let r, g, b, a;
      if (currentView === 'heat') {
        // Heat map — strong colors
        if (k < 0.1) { r = 20; g = 80; b = 120; a = 0.15; }
        else if (k < 0.3) { r = 40; g = 160; b = 180; a = 0.12; }
        else if (k < 0.5) { r = 200; g = 160; b = 40; a = 0.1; }
        else { r = 220; g = 80; b = 40; a = 0.12; }
      } else {
        // Subtle topology
        if (k < 0.1) { r = 15; g = 50; b = 80; a = 0.06; }
        else if (k < 0.3) { r = 30; g = 80; b = 100; a = 0.04; }
        else if (k < 0.5) { r = 100; g = 80; b = 40; a = 0.04; }
        else { r = 140; g = 50; b = 30; a = 0.05; }
      }

      ctx.fillStyle = `rgba(${r}, ${g}, ${b}, ${a})`;
      ctx.fillRect(px, py, res, res);
    }
  }
}

// Contour lines on the manifold
function drawContours() {
  if (currentView === 'heat') return;
  const res = 4;
  const levels = [0.1, 0.2, 0.3, 0.45, 0.6];

  for (const level of levels) {
    const alpha = level < 0.3 ? 0.08 : 0.06;
    const color = level < 0.3
      ? `rgba(60, 180, 220, ${alpha})`
      : `rgba(230, 126, 34, ${alpha})`;

    ctx.fillStyle = color;
    for (let px = 0; px < W; px += res) {
      for (let py = 0; py < H; py += res) {
        const k = curvature(px / W, py / H);
        if (Math.abs(k - level) < 0.012) {
          ctx.fillRect(px, py, 1, 1);
        }
      }
    }
  }
}

// Region labels
function drawRegions() {
  const pulse = Math.sin(time * 0.02) * 0.1 + 0.9;

  // Truth basin
  const tbx = truthBasin.x * W, tby = truthBasin.y * H;
  const tbGrd = ctx.createRadialGradient(tbx, tby, 0, tbx, tby, truthBasin.r * W);
  tbGrd.addColorStop(0, `rgba(46, 204, 113, ${0.06 * pulse})`);
  tbGrd.addColorStop(1, 'rgba(46, 204, 113, 0)');
  ctx.fillStyle = tbGrd;
  ctx.beginPath(); ctx.arc(tbx, tby, truthBasin.r * W, 0, Math.PI * 2); ctx.fill();

  ctx.font = '10px "Space Grotesk"';
  ctx.fillStyle = `rgba(46, 204, 113, ${0.45 * pulse})`;
  ctx.textAlign = 'center';
  ctx.fillText('TRUTH BASIN', tbx, tby - 10);
  ctx.font = '8px "IBM Plex Mono"';
  ctx.fillStyle = 'rgba(46, 204, 113, 0.25)';
  ctx.fillText('low curvature', tbx, tby + 5);
  ctx.textAlign = 'left';

  // High curvature
  const hcx = highCurve.x * W, hcy = highCurve.y * H;
  const hcGrd = ctx.createRadialGradient(hcx, hcy, 0, hcx, hcy, highCurve.r * W);
  hcGrd.addColorStop(0, `rgba(231, 76, 60, ${0.08 * pulse})`);
  hcGrd.addColorStop(1, 'rgba(231, 76, 60, 0)');
  ctx.fillStyle = hcGrd;
  ctx.beginPath(); ctx.arc(hcx, hcy, highCurve.r * W, 0, Math.PI * 2); ctx.fill();

  ctx.font = '10px "Space Grotesk"';
  ctx.fillStyle = `rgba(231, 76, 60, ${0.45 * pulse})`;
  ctx.textAlign = 'center';
  ctx.fillText('HIGH CURVATURE', hcx, hcy - 10);
  ctx.font = '8px "IBM Plex Mono"';
  ctx.fillStyle = 'rgba(231, 76, 60, 0.25)';
  ctx.fillText('instability zone', hcx, hcy + 5);
  ctx.textAlign = 'left';

  // Frontier
  const fx = frontier.x * W, fy = frontier.y * H;
  const fGrd = ctx.createRadialGradient(fx, fy, 0, fx, fy, frontier.r * W);
  fGrd.addColorStop(0, `rgba(155, 89, 182, ${0.06 * pulse})`);
  fGrd.addColorStop(1, 'rgba(155, 89, 182, 0)');
  ctx.fillStyle = fGrd;
  ctx.beginPath(); ctx.arc(fx, fy, frontier.r * W, 0, Math.PI * 2); ctx.fill();

  ctx.font = '10px "Space Grotesk"';
  ctx.fillStyle = `rgba(155, 89, 182, ${0.45 * pulse})`;
  ctx.textAlign = 'center';
  ctx.fillText('UNEXPLORED', fx, fy - 10);
  ctx.font = '8px "IBM Plex Mono"';
  ctx.fillStyle = 'rgba(155, 89, 182, 0.25)';
  ctx.fillText('frontier', fx, fy + 5);
  ctx.textAlign = 'left';
}

// Geodesic paths
function drawGeodesics() {
  if (currentView !== 'geodesic' && currentView !== 'topo') return;
  const show = currentView === 'geodesic';
  const alpha = show ? 0.2 : 0.06;

  // Draw a few geodesic curves between key regions
  const paths = [
    { from: truthBasin, to: highCurve },
    { from: truthBasin, to: frontier },
    { from: highCurve, to: frontier }
  ];

  const colors = ['rgba(60, 180, 220,', 'rgba(46, 204, 113,', 'rgba(155, 89, 182,'];

  paths.forEach((path, idx) => {
    ctx.strokeStyle = `${colors[idx]} ${alpha})`;
    ctx.lineWidth = show ? 1.5 : 0.8;
    ctx.setLineDash(show ? [] : [4, 6]);
    ctx.beginPath();

    const steps = 60;
    for (let i = 0; i <= steps; i++) {
      const t = i / steps;
      const mx = path.from.x + (path.to.x - path.from.x) * t;
      const my = path.from.y + (path.to.y - path.from.y) * t;
      // Curve based on curvature
      const k = curvature(mx, my);
      const curve = Math.sin(t * Math.PI) * k * 0.15;
      const px = (mx + curve * Math.sin(t * 3)) * W;
      const py = (my + curve * Math.cos(t * 3)) * H;

      if (i === 0) ctx.moveTo(px, py);
      else ctx.lineTo(px, py);
    }
    ctx.stroke();
    ctx.setLineDash([]);

    // Distance label
    if (show) {
      const mid = 0.5;
      const mx = (path.from.x + path.to.x) / 2 * W;
      const my = (path.from.y + path.to.y) / 2 * H - 10;
      const dist = Math.sqrt((path.to.x - path.from.x) ** 2 + (path.to.y - path.from.y) ** 2);
      ctx.font = '8px "IBM Plex Mono"';
      ctx.fillStyle = `${colors[idx]} 0.4)`;
      ctx.textAlign = 'center';
      ctx.fillText(`d=${(dist * 3).toFixed(2)}`, mx, my);
      ctx.textAlign = 'left';
    }
  });
}

// Cluster boundaries
function drawClusters() {
  if (currentView !== 'cluster') return;

  const clusterColors = [
    'rgba(46, 204, 113, 0.12)',
    'rgba(60, 180, 220, 0.08)',
    'rgba(231, 76, 60, 0.1)',
    'rgba(155, 89, 182, 0.1)'
  ];

  const clusterStroke = [
    'rgba(46, 204, 113, 0.2)',
    'rgba(60, 180, 220, 0.15)',
    'rgba(231, 76, 60, 0.18)',
    'rgba(155, 89, 182, 0.18)'
  ];

  // Group theories by cluster and draw boundaries
  for (let c = 0; c < 4; c++) {
    const clusterTheories = theories.filter(t => t.cluster === c);
    if (clusterTheories.length < 2) continue;

    // Centroid
    let sumX = 0, sumY = 0;
    clusterTheories.forEach(t => { sumX += t.x; sumY += t.y; });
    const centX = sumX / clusterTheories.length * W;
    const centY = sumY / clusterTheories.length * H;

    // Max distance from centroid
    let maxDist = 0;
    clusterTheories.forEach(t => {
      const d = Math.sqrt((t.x * W - centX) ** 2 + (t.y * H - centY) ** 2);
      if (d > maxDist) maxDist = d;
    });

    const r = maxDist + 30;
    ctx.fillStyle = clusterColors[c];
    ctx.beginPath();
    ctx.arc(centX, centY, r, 0, Math.PI * 2);
    ctx.fill();

    ctx.strokeStyle = clusterStroke[c];
    ctx.lineWidth = 1;
    ctx.setLineDash([4, 4]);
    ctx.beginPath();
    ctx.arc(centX, centY, r, 0, Math.PI * 2);
    ctx.stroke();
    ctx.setLineDash([]);
  }
}

// Theory points
function drawTheories() {
  for (const t of theories) {
    t.x += t.drift.dx;
    t.y += t.drift.dy;

    // Soft bounds
    if (t.x < 0.05 || t.x > 0.95) t.drift.dx *= -1;
    if (t.y < 0.05 || t.y > 0.95) t.drift.dy *= -1;

    const px = t.x * W, py = t.y * H;
    const pulse = Math.sin(time * 0.02 + t.pulseOffset) * 0.2 + 0.8;

    // Color by cluster
    const colors = [
      { r: 46, g: 204, b: 113 },
      { r: 60, g: 180, b: 220 },
      { r: 231, g: 76, b: 60 },
      { r: 155, g: 89, b: 182 }
    ];
    const c = colors[t.cluster];

    // Glow
    const grd = ctx.createRadialGradient(px, py, 0, px, py, t.size * 3);
    grd.addColorStop(0, `rgba(${c.r}, ${c.g}, ${c.b}, ${0.2 * pulse})`);
    grd.addColorStop(1, `rgba(${c.r}, ${c.g}, ${c.b}, 0)`);
    ctx.fillStyle = grd;
    ctx.beginPath();
    ctx.arc(px, py, t.size * 3, 0, Math.PI * 2);
    ctx.fill();

    // Dot
    ctx.fillStyle = `rgba(${c.r}, ${c.g}, ${c.b}, ${0.5 + pulse * 0.4})`;
    ctx.beginPath();
    ctx.arc(px, py, t.size * pulse, 0, Math.PI * 2);
    ctx.fill();
  }
}

// Metrics fluctuation
function updateMetrics() {
  if (time % 90 !== 0) return;
  const k = 0.35 + Math.random() * 0.15;
  const d = 1.1 + Math.random() * 0.4;
  const c = 0.75 + Math.random() * 0.15;
  const n = 0.5 + Math.random() * 0.3;
  const e = 0.85 + Math.random() * 0.1;

  document.getElementById('g-curve').textContent = k.toFixed(2);
  document.getElementById('g-dist').textContent = d.toFixed(2);
  document.getElementById('g-cohere').textContent = c.toFixed(2);
  document.getElementById('g-novel').textContent = n.toFixed(2);
  document.getElementById('g-evidence').textContent = e.toFixed(2);
}

function render() {
  time++;
  ctx.clearRect(0, 0, W, H);

  drawManifoldField();
  drawContours();
  drawClusters();
  drawGeodesics();
  drawRegions();
  drawTheories();
  updateMetrics();

  requestAnimationFrame(render);
}

window.addEventListener('resize', resize);
resize();
initTheories();
render();
</script>
</body>
</html>
