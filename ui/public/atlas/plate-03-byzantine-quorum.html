<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Oracle OS — Byzantine Quorum Constellation</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@300;400;500;600&family=Space+Grotesk:wght@300;400;500;600;700&display=swap');

  :root {
    --bg: #030308;
    --bg-panel: rgba(8, 12, 24, 0.88);
    --border: rgba(60, 180, 220, 0.12);
    --cyan: #3cb4dc;
    --green: #2ecc71;
    --red: #e74c3c;
    --orange: #e67e22;
    --gold: #C9A227;
    --purple: #9b59b6;
    --teal: #1a9e8f;
    --text: #c8d6e5;
    --text-dim: rgba(200, 214, 229, 0.45);
    --font-mono: 'IBM Plex Mono', monospace;
    --font-display: 'Space Grotesk', sans-serif;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--font-mono);
    overflow: hidden;
    height: 100vh;
    width: 100vw;
  }

  .header {
    position: fixed;
    top: 0; left: 0; right: 0;
    height: 44px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 20px;
    border-bottom: 1px solid var(--border);
    background: var(--bg-panel);
    backdrop-filter: blur(16px);
    z-index: 200;
  }

  .header-left { display: flex; align-items: center; gap: 14px; }

  .logo {
    font-family: var(--font-display);
    font-weight: 600; font-size: 13px;
    letter-spacing: 2.5px; text-transform: uppercase;
    color: var(--cyan);
  }

  .plate-label {
    font-size: 10px; color: var(--text-dim);
    letter-spacing: 1.5px; text-transform: uppercase;
  }

  .header-right { display: flex; align-items: center; gap: 16px; }

  .consensus-status {
    font-size: 11px; letter-spacing: 1px;
    padding: 3px 10px; border-radius: 4px;
  }

  .status-committed {
    background: rgba(46, 204, 113, 0.15);
    color: var(--green);
    box-shadow: 0 0 12px rgba(46, 204, 113, 0.1);
  }

  .status-voting {
    background: rgba(201, 162, 39, 0.15);
    color: var(--gold);
    animation: pulse-status 1.5s ease infinite;
  }

  @keyframes pulse-status { 0%,100%{opacity:1} 50%{opacity:0.6} }

  #main-canvas {
    position: fixed;
    top: 44px; left: 0;
    width: 100%; height: calc(100vh - 44px);
  }

  /* Agent Cards */
  .agent-panel {
    position: fixed;
    top: 68px; left: 20px;
    width: 200px;
    background: var(--bg-panel);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 14px;
    backdrop-filter: blur(12px);
    z-index: 50;
  }

  .agent-panel h3 {
    font-family: var(--font-display);
    font-size: 10px; letter-spacing: 2px;
    text-transform: uppercase; color: var(--cyan);
    margin-bottom: 10px; padding-bottom: 6px;
    border-bottom: 1px solid var(--border);
  }

  .agent-row {
    display: flex; justify-content: space-between;
    align-items: center; padding: 4px 0;
  }

  .agent-name {
    font-size: 10px; display: flex;
    align-items: center; gap: 6px;
  }

  .agent-dot {
    width: 6px; height: 6px;
    border-radius: 50%;
  }

  .agent-trust {
    font-size: 11px; font-weight: 500;
    font-variant-numeric: tabular-nums;
  }

  /* Quorum Panel */
  .quorum-panel {
    position: fixed;
    top: 68px; right: 20px;
    width: 220px;
    background: var(--bg-panel);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 14px;
    backdrop-filter: blur(12px);
    z-index: 50;
  }

  .quorum-panel h3 {
    font-family: var(--font-display);
    font-size: 10px; letter-spacing: 2px;
    text-transform: uppercase; color: var(--cyan);
    margin-bottom: 10px; padding-bottom: 6px;
    border-bottom: 1px solid var(--border);
  }

  .quorum-row {
    display: flex; justify-content: space-between;
    align-items: baseline; padding: 5px 0;
  }

  .quorum-label {
    font-size: 9px; color: var(--text-dim);
    letter-spacing: 1px; text-transform: uppercase;
  }

  .quorum-val {
    font-size: 13px; font-weight: 500;
    font-variant-numeric: tabular-nums;
  }

  .val-green { color: var(--green); }
  .val-cyan { color: var(--cyan); }
  .val-gold { color: var(--gold); }
  .val-red { color: var(--red); }

  /* Vote Log */
  .vote-panel {
    position: fixed;
    bottom: 20px; right: 20px;
    width: 280px;
    max-height: 200px;
    background: var(--bg-panel);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 14px;
    backdrop-filter: blur(12px);
    z-index: 50;
    overflow-y: auto;
  }

  .vote-panel::-webkit-scrollbar { width: 3px; }
  .vote-panel::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  .vote-panel h3 {
    font-family: var(--font-display);
    font-size: 10px; letter-spacing: 2px;
    text-transform: uppercase; color: var(--cyan);
    margin-bottom: 8px; padding-bottom: 6px;
    border-bottom: 1px solid var(--border);
  }

  .vote-entry {
    font-size: 9px; padding: 4px 0;
    border-bottom: 1px solid rgba(255,255,255,0.02);
    display: flex; gap: 8px; align-items: center;
  }

  .vote-icon { font-size: 10px; }
  .vote-agent { color: var(--text-dim); min-width: 70px; }
  .vote-action { color: var(--text); }
  .vote-commit { color: var(--green); }
  .vote-reject { color: var(--red); }
  .vote-abstain { color: var(--gold); }

  /* Equation */
  .equation {
    position: fixed;
    bottom: 20px; left: 20px;
    background: var(--bg-panel);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 16px;
    backdrop-filter: blur(12px);
    z-index: 50;
    font-size: 11px;
    color: rgba(60, 180, 220, 0.4);
    line-height: 1.8;
  }

  .equation em {
    color: var(--cyan); font-style: normal; font-weight: 500;
  }
</style>
</head>
<body>

<div class="header">
  <div class="header-left">
    <span class="logo">Oracle OS</span>
    <span class="plate-label">Plate III — Distributed Epistemic Quorum</span>
  </div>
  <div class="header-right">
    <span class="consensus-status status-committed" id="consensus-badge">COMMITTED</span>
  </div>
</div>

<canvas id="main-canvas"></canvas>

<div class="agent-panel">
  <h3>Cognitive Roles</h3>
  <div id="agent-list"></div>
</div>

<div class="quorum-panel">
  <h3>Quorum State</h3>
  <div class="quorum-row">
    <span class="quorum-label">Consensus</span>
    <span class="quorum-val val-green" id="q-consensus">0.92</span>
  </div>
  <div class="quorum-row">
    <span class="quorum-label">Tolerance</span>
    <span class="quorum-val val-cyan">n &ge; 3f+1</span>
  </div>
  <div class="quorum-row">
    <span class="quorum-label">Commit Model</span>
    <span class="quorum-val val-cyan" id="q-model">4-of-6</span>
  </div>
  <div class="quorum-row">
    <span class="quorum-label">Round</span>
    <span class="quorum-val val-cyan" id="q-round">1</span>
  </div>
  <div class="quorum-row">
    <span class="quorum-label">Votes Cast</span>
    <span class="quorum-val val-green" id="q-votes">6/6</span>
  </div>
  <div class="quorum-row">
    <span class="quorum-label">Byzantine</span>
    <span class="quorum-val val-gold" id="q-byz">0</span>
  </div>
  <div class="quorum-row">
    <span class="quorum-label">Weighted C(h)</span>
    <span class="quorum-val val-green" id="q-weighted">0.94</span>
  </div>
</div>

<div class="vote-panel">
  <h3>Vote Log</h3>
  <div id="vote-log"></div>
</div>

<div class="equation">
  <em>C(h)</em> = &Sigma; w<sub>i</sub> &middot; P<sub>i</sub>(h)<br>
  <em>n</em> &ge; 3<em>f</em> + 1 &nbsp;|&nbsp; commit: <em>k</em>-of-<em>n</em>
</div>

<script>
const canvas = document.getElementById('main-canvas');
const ctx = canvas.getContext('2d');
let W, H, cx, cy;
let time = 0;

// ─── Agent Definitions ───
const roles = [
  { name: 'Governor',  color: '#2ecc71', trust: 0.96, type: 'honest',  icon: '\u2660' },
  { name: 'Critic',    color: '#e74c3c', trust: 0.91, type: 'skeptic', icon: '\u2663' },
  { name: 'Verifier',  color: '#3cb4dc', trust: 0.94, type: 'honest',  icon: '\u2666' },
  { name: 'Repairer',  color: '#e67e22', trust: 0.93, type: 'repairer',icon: '\u2665' },
  { name: 'Operator',  color: '#9b59b6', trust: 0.89, type: 'honest',  icon: '\u25C6' },
  { name: 'Archivist', color: '#1a9e8f', trust: 0.92, type: 'honest',  icon: '\u25CB' }
];

// Extended agent ring (12 agents for weighted consensus)
const agents = [];
for (let i = 0; i < 12; i++) {
  const role = roles[i % 6];
  agents.push({
    id: `A${i + 1}`,
    role: role.name,
    color: role.color,
    trust: 0.87 + Math.random() * 0.1,
    type: i === 11 ? 'byzantine' : role.type,
    angle: (i / 12) * Math.PI * 2 - Math.PI / 2,
    orbitRadius: 0,
    pulseOffset: Math.random() * Math.PI * 2,
    voteState: 'pending', // pending, commit, reject, abstain
    messagePhase: 0
  });
}

// Messages between agents
const messages = [];
let voteRound = 1;
let consensusScore = 0.92;

// ─── Populate Agent List ───
const agentListEl = document.getElementById('agent-list');
roles.forEach(r => {
  const row = document.createElement('div');
  row.className = 'agent-row';
  row.innerHTML = `
    <span class="agent-name">
      <span class="agent-dot" style="background: ${r.color}; box-shadow: 0 0 6px ${r.color};"></span>
      ${r.name}
    </span>
    <span class="agent-trust" style="color: ${r.color};">${r.trust.toFixed(2)}</span>
  `;
  agentListEl.appendChild(row);
});

// ─── Vote Log ───
const voteLogEl = document.getElementById('vote-log');
const voteActions = ['COMMIT', 'COMMIT', 'COMMIT', 'COMMIT', 'ABSTAIN', 'REJECT'];

function addVoteEntry(agentId, role, action) {
  const entry = document.createElement('div');
  entry.className = 'vote-entry';
  const cls = action === 'COMMIT' ? 'vote-commit' : action === 'REJECT' ? 'vote-reject' : 'vote-abstain';
  entry.innerHTML = `
    <span class="vote-agent">${agentId} (${role})</span>
    <span class="vote-action ${cls}">${action}</span>
  `;
  voteLogEl.insertBefore(entry, voteLogEl.firstChild);
  if (voteLogEl.children.length > 30) voteLogEl.removeChild(voteLogEl.lastChild);
}

function resize() {
  const dpr = window.devicePixelRatio || 1;
  W = window.innerWidth;
  H = window.innerHeight - 44;
  canvas.width = W * dpr;
  canvas.height = H * dpr;
  canvas.style.width = W + 'px';
  canvas.style.height = H + 'px';
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  cx = W / 2;
  cy = H / 2;

  // Set orbit radii
  const scale = Math.min(W, H) * 0.32;
  agents.forEach((a, i) => {
    a.orbitRadius = i < 6 ? scale : scale * 0.65;
  });
}

// ─── Star field background ───
const stars = Array.from({ length: 200 }, () => ({
  x: Math.random(),
  y: Math.random(),
  size: Math.random() * 1.2 + 0.3,
  brightness: Math.random(),
  twinkleSpeed: 0.01 + Math.random() * 0.03
}));

function drawStars() {
  for (const s of stars) {
    const alpha = 0.1 + Math.sin(time * s.twinkleSpeed + s.brightness * 10) * 0.08;
    ctx.fillStyle = `rgba(180, 200, 230, ${alpha})`;
    ctx.beginPath();
    ctx.arc(s.x * W, s.y * H, s.size, 0, Math.PI * 2);
    ctx.fill();
  }
}

// ─── Quorum Gate (center) ───
function drawQuorumGate() {
  const pulse = Math.sin(time * 0.02) * 0.15 + 0.85;

  // Outer ring
  ctx.strokeStyle = `rgba(60, 180, 220, ${0.15 * pulse})`;
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.arc(cx, cy, 45, 0, Math.PI * 2);
  ctx.stroke();

  // Inner ring
  ctx.strokeStyle = `rgba(46, 204, 113, ${0.2 * pulse})`;
  ctx.lineWidth = 1.5;
  ctx.beginPath();
  ctx.arc(cx, cy, 30, 0, Math.PI * 2);
  ctx.stroke();

  // Glow
  const grd = ctx.createRadialGradient(cx, cy, 0, cx, cy, 50);
  grd.addColorStop(0, `rgba(46, 204, 113, ${0.12 * pulse})`);
  grd.addColorStop(0.5, `rgba(60, 180, 220, ${0.05 * pulse})`);
  grd.addColorStop(1, 'rgba(60, 180, 220, 0)');
  ctx.fillStyle = grd;
  ctx.beginPath();
  ctx.arc(cx, cy, 50, 0, Math.PI * 2);
  ctx.fill();

  // Hexagon
  ctx.strokeStyle = `rgba(60, 180, 220, ${0.25 * pulse})`;
  ctx.lineWidth = 1;
  ctx.beginPath();
  for (let i = 0; i < 6; i++) {
    const a = (i / 6) * Math.PI * 2 - Math.PI / 2;
    const x = cx + Math.cos(a) * 22;
    const y = cy + Math.sin(a) * 22;
    if (i === 0) ctx.moveTo(x, y);
    else ctx.lineTo(x, y);
  }
  ctx.closePath();
  ctx.stroke();

  // Label
  ctx.font = '9px "Space Grotesk"';
  ctx.fillStyle = `rgba(60, 180, 220, ${0.6 * pulse})`;
  ctx.textAlign = 'center';
  ctx.fillText('QUORUM', cx, cy - 3);
  ctx.font = '8px "IBM Plex Mono"';
  ctx.fillStyle = `rgba(46, 204, 113, ${0.5 * pulse})`;
  ctx.fillText('COMMIT', cx, cy + 9);
  ctx.textAlign = 'left';
}

// ─── Connection lines ───
function drawConnections() {
  // Inner ring connections (star topology to center)
  for (let i = 0; i < 6; i++) {
    const a = agents[i];
    const ax = cx + Math.cos(a.angle) * a.orbitRadius;
    const ay = cy + Math.sin(a.angle) * a.orbitRadius;

    const alpha = 0.06 + Math.sin(time * 0.01 + i) * 0.03;
    ctx.strokeStyle = `rgba(${hexToRgb(a.color)}, ${alpha})`;
    ctx.lineWidth = 0.8;
    ctx.beginPath();
    ctx.moveTo(ax, ay);
    ctx.lineTo(cx, cy);
    ctx.stroke();
  }

  // Cross-agent connections (selective)
  for (let i = 0; i < 6; i++) {
    const a1 = agents[i];
    const a2 = agents[(i + 2) % 6];
    const x1 = cx + Math.cos(a1.angle) * a1.orbitRadius;
    const y1 = cy + Math.sin(a1.angle) * a1.orbitRadius;
    const x2 = cx + Math.cos(a2.angle) * a2.orbitRadius;
    const y2 = cy + Math.sin(a2.angle) * a2.orbitRadius;

    ctx.strokeStyle = `rgba(100, 140, 180, 0.04)`;
    ctx.lineWidth = 0.5;
    ctx.beginPath();
    ctx.moveTo(x1, y1);
    ctx.lineTo(x2, y2);
    ctx.stroke();
  }

  // Outer to inner connections
  for (let i = 6; i < 12; i++) {
    const outer = agents[i];
    const inner = agents[i - 6];
    const ox = cx + Math.cos(outer.angle) * outer.orbitRadius;
    const oy = cy + Math.sin(outer.angle) * outer.orbitRadius;
    const ix = cx + Math.cos(inner.angle) * inner.orbitRadius;
    const iy = cy + Math.sin(inner.angle) * inner.orbitRadius;

    ctx.strokeStyle = `rgba(155, 89, 182, 0.04)`;
    ctx.lineWidth = 0.5;
    ctx.setLineDash([3, 5]);
    ctx.beginPath();
    ctx.moveTo(ox, oy);
    ctx.lineTo(ix, iy);
    ctx.stroke();
    ctx.setLineDash([]);
  }
}

// ─── Agent Nodes ───
function drawAgents() {
  for (let i = 0; i < agents.length; i++) {
    const a = agents[i];
    const pulse = Math.sin(time * 0.025 + a.pulseOffset) * 0.25 + 0.75;
    const x = cx + Math.cos(a.angle) * a.orbitRadius;
    const y = cy + Math.sin(a.angle) * a.orbitRadius;
    const isInner = i < 6;
    const nodeSize = isInner ? 8 : 5;
    const rgb = hexToRgb(a.color);

    // Orbit path (faint)
    if (isInner) {
      ctx.strokeStyle = `rgba(${rgb}, 0.04)`;
      ctx.lineWidth = 0.5;
      ctx.beginPath();
      ctx.arc(cx, cy, a.orbitRadius, 0, Math.PI * 2);
      ctx.stroke();
    }

    // Glow
    const glowR = nodeSize * (isInner ? 4 : 3);
    const grd = ctx.createRadialGradient(x, y, 0, x, y, glowR);
    grd.addColorStop(0, `rgba(${rgb}, ${0.25 * pulse})`);
    grd.addColorStop(1, `rgba(${rgb}, 0)`);
    ctx.fillStyle = grd;
    ctx.beginPath();
    ctx.arc(x, y, glowR, 0, Math.PI * 2);
    ctx.fill();

    // Trust ring
    if (isInner) {
      const trustAngle = a.trust * Math.PI * 2;
      ctx.strokeStyle = `rgba(${rgb}, ${0.3 * pulse})`;
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.arc(x, y, nodeSize + 5, -Math.PI / 2, -Math.PI / 2 + trustAngle);
      ctx.stroke();
    }

    // Node
    ctx.fillStyle = a.type === 'byzantine'
      ? `rgba(231, 76, 60, ${0.5 + pulse * 0.3})`
      : `rgba(${rgb}, ${0.6 + pulse * 0.3})`;
    ctx.beginPath();
    ctx.arc(x, y, nodeSize * pulse, 0, Math.PI * 2);
    ctx.fill();

    // Label
    if (isInner) {
      ctx.font = '9px "Space Grotesk"';
      ctx.fillStyle = `rgba(${rgb}, 0.75)`;
      ctx.textAlign = 'center';
      ctx.fillText(a.role.toUpperCase(), x, y + nodeSize + 18);

      ctx.font = '8px "IBM Plex Mono"';
      ctx.fillStyle = `rgba(${rgb}, 0.4)`;
      ctx.fillText(`w=${a.trust.toFixed(2)}`, x, y + nodeSize + 30);
      ctx.textAlign = 'left';
    } else {
      ctx.font = '7px "IBM Plex Mono"';
      ctx.fillStyle = `rgba(${rgb}, 0.4)`;
      ctx.textAlign = 'center';
      ctx.fillText(a.id, x, y + nodeSize + 12);
      ctx.fillText(a.trust.toFixed(2), x, y + nodeSize + 22);
      ctx.textAlign = 'left';
    }

    // Slow orbit
    a.angle += (isInner ? 0.001 : -0.0007);
  }
}

// ─── Message Particles ───
function spawnMessage() {
  if (messages.length > 20) return;
  const fromIdx = Math.floor(Math.random() * 6);
  const toCenter = Math.random() < 0.6;
  const toIdx = toCenter ? -1 : Math.floor(Math.random() * 6);

  const from = agents[fromIdx];
  const fx = cx + Math.cos(from.angle) * from.orbitRadius;
  const fy = cy + Math.sin(from.angle) * from.orbitRadius;

  let tx, ty;
  if (toCenter) {
    tx = cx; ty = cy;
  } else {
    const to = agents[toIdx];
    tx = cx + Math.cos(to.angle) * to.orbitRadius;
    ty = cy + Math.sin(to.angle) * to.orbitRadius;
  }

  messages.push({
    fx, fy, tx, ty,
    progress: 0,
    speed: 0.008 + Math.random() * 0.012,
    color: from.color,
    size: 2
  });
}

function updateMessages() {
  for (let i = messages.length - 1; i >= 0; i--) {
    const m = messages[i];
    m.progress += m.speed;
    if (m.progress >= 1) {
      messages.splice(i, 1);
    }
  }
}

function drawMessages() {
  for (const m of messages) {
    const t = m.progress;
    const x = m.fx + (m.tx - m.fx) * t;
    const y = m.fy + (m.ty - m.fy) * t;
    const alpha = Math.sin(t * Math.PI) * 0.8;
    const rgb = hexToRgb(m.color);

    // Trail
    for (let j = 1; j <= 4; j++) {
      const tt = Math.max(0, t - j * 0.02);
      const tx = m.fx + (m.tx - m.fx) * tt;
      const ty = m.fy + (m.ty - m.fy) * tt;
      ctx.fillStyle = `rgba(${rgb}, ${alpha * 0.15 / j})`;
      ctx.beginPath();
      ctx.arc(tx, ty, m.size * 0.7, 0, Math.PI * 2);
      ctx.fill();
    }

    // Particle
    const grd = ctx.createRadialGradient(x, y, 0, x, y, m.size * 3);
    grd.addColorStop(0, `rgba(${rgb}, ${alpha * 0.6})`);
    grd.addColorStop(1, `rgba(${rgb}, 0)`);
    ctx.fillStyle = grd;
    ctx.beginPath();
    ctx.arc(x, y, m.size * 3, 0, Math.PI * 2);
    ctx.fill();

    ctx.fillStyle = `rgba(${rgb}, ${alpha})`;
    ctx.beginPath();
    ctx.arc(x, y, m.size, 0, Math.PI * 2);
    ctx.fill();
  }
}

// ─── Consensus Wave ───
let waveRadius = 0;
let waveActive = false;
let waveAlpha = 0;

function triggerWave() {
  waveRadius = 0;
  waveActive = true;
  waveAlpha = 0.3;
}

function drawWave() {
  if (!waveActive) return;
  waveRadius += 2;
  waveAlpha *= 0.985;

  ctx.strokeStyle = `rgba(46, 204, 113, ${waveAlpha})`;
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.arc(cx, cy, waveRadius, 0, Math.PI * 2);
  ctx.stroke();

  if (waveAlpha < 0.005) waveActive = false;
}

// ─── Agreement Heatmap (subtle background) ───
function drawAgreementField() {
  for (let i = 0; i < 6; i++) {
    for (let j = i + 1; j < 6; j++) {
      const a1 = agents[i];
      const a2 = agents[j];
      const x1 = cx + Math.cos(a1.angle) * a1.orbitRadius;
      const y1 = cy + Math.sin(a1.angle) * a1.orbitRadius;
      const x2 = cx + Math.cos(a2.angle) * a2.orbitRadius;
      const y2 = cy + Math.sin(a2.angle) * a2.orbitRadius;
      const mx = (x1 + x2) / 2;
      const my = (y1 + y2) / 2;

      const agreement = (a1.trust + a2.trust) / 2;
      const alpha = (agreement - 0.85) * 0.5;

      if (alpha > 0) {
        const grd = ctx.createRadialGradient(mx, my, 0, mx, my, 40);
        grd.addColorStop(0, `rgba(46, 204, 113, ${alpha * 0.08})`);
        grd.addColorStop(1, 'rgba(46, 204, 113, 0)');
        ctx.fillStyle = grd;
        ctx.beginPath();
        ctx.arc(mx, my, 40, 0, Math.PI * 2);
        ctx.fill();
      }
    }
  }
}

// ─── Vote simulation ───
function runVoteRound() {
  voteRound++;
  document.getElementById('q-round').textContent = voteRound;

  let commits = 0;
  const badge = document.getElementById('consensus-badge');
  badge.textContent = 'VOTING';
  badge.className = 'consensus-status status-voting';

  agents.forEach((a, i) => {
    if (i >= 6) return;
    setTimeout(() => {
      let action;
      if (a.type === 'byzantine') {
        action = Math.random() < 0.7 ? 'REJECT' : 'COMMIT';
      } else if (a.type === 'skeptic') {
        action = Math.random() < 0.75 ? 'COMMIT' : 'ABSTAIN';
      } else {
        action = Math.random() < 0.9 ? 'COMMIT' : 'ABSTAIN';
      }

      a.voteState = action.toLowerCase();
      addVoteEntry(a.id || `A${i+1}`, a.role, action);
      if (action === 'COMMIT') commits++;

      // After all votes
      if (i === 5) {
        setTimeout(() => {
          const passed = commits >= 4;
          consensusScore = 0.85 + Math.random() * 0.12;

          document.getElementById('q-consensus').textContent = consensusScore.toFixed(2);
          document.getElementById('q-votes').textContent = `6/6`;
          document.getElementById('q-weighted').textContent = consensusScore.toFixed(2);

          badge.textContent = passed ? 'COMMITTED' : 'REJECTED';
          badge.className = `consensus-status ${passed ? 'status-committed' : 'status-voting'}`;
          if (passed) badge.style.cssText = '';

          if (passed) triggerWave();
        }, 500);
      }
    }, i * 400);
  });
}

// Run vote rounds periodically
setInterval(runVoteRound, 12000);
setTimeout(runVoteRound, 2000);

function hexToRgb(hex) {
  const r = parseInt(hex.slice(1, 3), 16);
  const g = parseInt(hex.slice(3, 5), 16);
  const b = parseInt(hex.slice(5, 7), 16);
  return `${r}, ${g}, ${b}`;
}

// ─── Main Loop ───
function render() {
  time++;
  ctx.clearRect(0, 0, W, H);

  drawStars();
  drawAgreementField();
  drawConnections();
  drawQuorumGate();
  drawAgents();

  if (time % 8 === 0 && Math.random() < 0.4) spawnMessage();
  updateMessages();
  drawMessages();
  drawWave();

  requestAnimationFrame(render);
}

window.addEventListener('resize', resize);
resize();
render();
</script>
